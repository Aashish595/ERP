services:
  - type: web
    name: erp-lms
    runtime: docker
    dockerfilePath: ./Dockerfile.free
    plan: free
    healthCheckPath: /health
    envVars:
      - key: NODE_ENV
        value: production
      - key: DATABASE_URL
        sync: false
      - key: DATABASE_SSL
        value: "true"
      - key: DB_POOL_MAX
        value: "5"
      - key: DB_IDLE_TIMEOUT_MS
        value: "30000"
      - key: DB_STATEMENT_TIMEOUT_MS
        value: "15000"
      - key: JWT_SECRET
        generateValue: true
      - key: AI_SERVICE_TOKEN
        generateValue: true
      - key: CORS_ORIGINS
        value: https://erp-sand-eight-92.vercel.app
      - key: FRONTEND_URL
        value: https://erp-sand-eight-92.vercel.app
      - key: PUBLIC_API_URL
        value: https://erp-lms.onrender.com
      - key: GOOGLE_CLIENT_ID
        sync: false
      - key: GOOGLE_CLIENT_SECRET
        sync: false
      - key: GOOGLE_CALLBACK_URL
        value: https://erp-lms.onrender.com/auth/google/callback
      - key: AI_SERVICE_URL
        value: http://127.0.0.1:8001
      - key: OPENROUTER_API_KEY
        sync: false
      - key: AI_MODEL
        value: openai/gpt-4.1-mini
      - key: REDIS_REQUIRED
        value: "false"
      - key: COOKIE_SECURE
        value: "true"
      - key: COOKIE_SAME_SITE
        value: none
      - key: EMAIL_OTP_DEBUG
        value: "false"
      - key: SMTP_HOST
        value: smtp-relay.brevo.com
      - key: SMTP_PORT
        value: "2525"
      - key: SMTP_USERNAME
        sync: false
      - key: SMTP_PASSWORD
        sync: false
      - key: SMTP_FROM_EMAIL
        sync: false
      - key: SMTP_FROM_NAME
        value: School ERP
      - key: SMTP_USE_TLS
        value: "true"
      - key: CLOUDINARY_CLOUD_NAME
        sync: false
      - key: CLOUDINARY_API_KEY
        sync: false
      - key: CLOUDINARY_API_SECRET
        sync: false
