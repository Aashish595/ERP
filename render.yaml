services:
  - type: web
    name: school-erp-express-ai
    runtime: docker
    dockerfilePath: ./Dockerfile.free
    plan: free
    healthCheckPath: /health
    envVars:
      - key: NODE_ENV
        value: production
      - key: DATABASE_URL
        sync: false
      - key: DATABASE_SSL
        value: "true"
      - key: JWT_SECRET
        generateValue: true
      - key: AI_SERVICE_TOKEN
        generateValue: true
      - key: CORS_ORIGINS
        sync: false
      - key: FRONTEND_URL
        sync: false
      - key: PUBLIC_API_URL
        sync: false
      - key: OPENROUTER_API_KEY
        sync: false
      - key: AI_MODEL
        value: openai/gpt-4.1-mini
      - key: REDIS_REQUIRED
        value: "false"
      - key: COOKIE_SECURE
        value: "true"
      - key: EMAIL_OTP_DEBUG
        value: "true"
